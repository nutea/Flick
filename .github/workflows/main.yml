name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  verify-linux:
    name: Verify Linux x64 Native Runtime
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libx11-dev \
            libxtst-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.15.0
          cache: pnpm

      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          cargo --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm check

      - name: Build and verify Linux AppImage
        run: pnpm electron:build:linux && pnpm native:smoke

      - name: Upload Linux installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: flick-linux-x64-installer
          path: |
            build/*.AppImage
            build/*.AppImage.blockmap
          if-no-files-found: error

  verify-macos:
    name: Build macOS arm64 Installer
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm check

      - name: Run macOS native tests
        run: pnpm --filter flick-native run native:test

      - name: Build and verify macOS DMG
        run: pnpm electron:build:mac && pnpm native:smoke

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: flick-macos-arm64-installer
          path: |
            build/*.dmg
            build/*.dmg.blockmap
            build/latest-mac.yml
          if-no-files-found: error

  build-win-x64:
    name: Build Windows x64 Installer
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.15.0
          cache: pnpm

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          cargo --version

      - name: Configure node-gyp Python
        shell: pwsh
        run: |
          "PYTHON=$env:pythonLocation\python.exe" >> $env:GITHUB_ENV
          "npm_config_python=$env:pythonLocation\python.exe" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm check

      - name: Validate release tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z]+)*$ ]]; then
            echo "Invalid release tag: $TAG"
            echo "Expected examples: v1.0.0, v1.2.3-beta.1"
            exit 1
          fi

      - name: Validate tag matches package version
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PKG_VERSION}"
          if [[ "$TAG" != "$EXPECTED_TAG" ]]; then
            echo "Tag does not match package.json version."
            echo "package.json version: ${PKG_VERSION}"
            echo "received tag: ${TAG}"
            echo "expected tag: ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Build Windows x64 installer
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            pnpm electron:build:local
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -eq $maxAttempts) {
              throw "Windows installer build failed after $maxAttempts attempts"
            }
            Write-Warning "Windows installer build attempt $attempt failed; retrying in 10 seconds"
            Start-Sleep -Seconds 10
          }

      - name: Smoke test Windows packaged startup
        shell: pwsh
        timeout-minutes: 2
        run: |
          $reportPath = Join-Path $PWD 'build\windows-smoke.json'
          $env:FLICK_MAIN_SMOKE = '1'
          $env:FLICK_PACKAGED_SMOKE = '1'
          $env:FLICK_SMOKE_REPORT = $reportPath
          $env:FLICK_STARTUP_DIAGNOSTICS = '1'
          $startupLog = Join-Path $env:APPDATA 'flick\startup.log'
          $process = Start-Process `
            -FilePath 'build\win-unpacked\Flick.exe' `
            -PassThru
          $deadline = (Get-Date).AddSeconds(45)
          while ((Get-Date) -lt $deadline -and -not (Test-Path $reportPath)) {
            Start-Sleep -Milliseconds 500
            $process.Refresh()
            if ($process.HasExited) {
              break
            }
          }
          if (-not (Test-Path $reportPath)) {
            if (Test-Path $startupLog) {
              Write-Host '--- Flick startup.log ---'
              Get-Content $startupLog -Raw
            }
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
            throw 'Packaged Flick did not create its smoke report'
          }
          $report = Get-Content $reportPath -Raw | ConvertFrom-Json
          $report | ConvertTo-Json -Depth 5
          if (-not $report.secure -and (Test-Path $startupLog)) {
            Write-Host '--- Flick startup.log ---'
            Get-Content $startupLog -Raw
          }
          if (
            -not $report.secure -or
            -not $report.packaged -or
            $report.platform -ne 'win32' -or
            $report.arch -ne 'x64'
          ) {
            throw 'Packaged Flick smoke report failed validation'
          }
          if (-not $process.WaitForExit(15000)) {
            Stop-Process -Id $process.Id -Force
            Write-Warning 'Packaged Flick startup passed; the smoke process required cleanup'
          } elseif ($process.ExitCode -ne 0) {
            Write-Warning "Packaged Flick startup passed; the smoke process exited with $($process.ExitCode) during test teardown"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: flick-win-x64-installer
          path: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
          if-no-files-found: error

  publish-release:
    name: Publish cross-platform Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs:
      - verify-linux
      - verify-macos
      - build-win-x64
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: flick-*-installer
          path: release-assets
          merge-multiple: true

      - name: Verify cross-platform installer set
        shell: bash
        run: |
          shopt -s nullglob
          windows=(release-assets/*.exe)
          macos=(release-assets/*.dmg)
          linux=(release-assets/*.AppImage)
          if (( ${#windows[@]} != 1 || ${#macos[@]} != 1 || ${#linux[@]} != 1 )); then
            echo "Expected exactly one Windows EXE, macOS DMG, and Linux AppImage."
            find release-assets -maxdepth 1 -type f -print
            exit 1
          fi
          printf 'Windows: %s\nmacOS: %s\nLinux: %s\n' \
            "${windows[0]}" "${macos[0]}" "${linux[0]}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Release $tag" \
              --latest
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Release $tag" \
              --generate-notes \
              --verify-tag \
              --latest
          fi
          gh release upload "$tag" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
