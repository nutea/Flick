name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  verify-macos:
    name: Verify macOS
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm check

      - name: Build macOS application assets
        run: pnpm apps:build && pnpm exec electron-vite build

  build-win-x64:
    name: Build Windows x64 Installer
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: pnpm

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          cargo --version

      - name: Configure node-gyp Python
        shell: pwsh
        run: |
          "PYTHON=$env:pythonLocation\python.exe" >> $env:GITHUB_ENV
          "npm_config_python=$env:pythonLocation\python.exe" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm check

      - name: Validate release tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z]+)*$ ]]; then
            echo "Invalid release tag: $TAG"
            echo "Expected examples: v1.0.0, v1.2.3-beta.1"
            exit 1
          fi

      - name: Validate tag matches package version
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PKG_VERSION}"
          if [[ "$TAG" != "$EXPECTED_TAG" ]]; then
            echo "Tag does not match package.json version."
            echo "package.json version: ${PKG_VERSION}"
            echo "received tag: ${TAG}"
            echo "expected tag: ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Build Windows x64 installer
        run: pnpm electron:build:local

      - name: Smoke test Windows packaged application
        shell: pwsh
        timeout-minutes: 2
        run: |
          $reportPath = Join-Path $PWD 'build\windows-smoke.json'
          $env:FLICK_MAIN_SMOKE = '1'
          $env:FLICK_PACKAGED_SMOKE = '1'
          $env:FLICK_SMOKE_REPORT = $reportPath
          $process = Start-Process `
            -FilePath 'build\win-unpacked\flick.exe' `
            -PassThru `
            -Wait
          if ($process.ExitCode -ne 0) {
            throw "Packaged Flick smoke process exited with $($process.ExitCode)"
          }
          if (-not (Test-Path $reportPath)) {
            throw 'Packaged Flick did not create its smoke report'
          }
          $report = Get-Content $reportPath -Raw | ConvertFrom-Json
          $report | ConvertTo-Json -Depth 5
          if (
            -not $report.secure -or
            -not $report.packaged -or
            $report.platform -ne 'win32' -or
            $report.arch -ne 'x64'
          ) {
            throw 'Packaged Flick smoke report failed validation'
          }

      - name: Publish GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload installer artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: flick-win-x64-installer
          path: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
          if-no-files-found: error
