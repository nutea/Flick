[package]
name = "flick_native"
version = "0.0.4"
edition = "2021"
publish = false

[features]
# objc 0.2 checks this legacy feature inside its macros. Declaring it keeps
# modern rustc check-cfg validation quiet without enabling different behavior.
cargo-clippy = []

[lib]
crate-type = ["cdylib"]

[dependencies]
# napi6 enables the threadsafe-function & async-task ABI we rely on.
napi = { version = "2", default-features = false, features = ["napi6"] }
napi-derive = "2"
screenshots = "0.8.10"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.59", features = [
  "Win32_Foundation",
  "Win32_System_Com",
  "Win32_System_DataExchange",
  "Win32_System_LibraryLoader",
  "Win32_System_Memory",
  "Win32_System_Ole",
  "Win32_System_Threading",
  "Win32_System_Variant",
  "Win32_UI_Input_KeyboardAndMouse",
  "Win32_UI_Accessibility",
  "Win32_UI_WindowsAndMessaging",
  "Win32_UI_Shell",
] }

[target.'cfg(not(windows))'.dependencies]
active-win-pos-rs = "0.11"
rdev = "0.5"

[target.'cfg(target_os = "macos")'.dependencies]
accessibility-ng = "0.1.6"
accessibility-sys-ng = "0.1.3"
core-foundation = "0.9"
core-graphics = "0.23"
objc = "0.2"

[build-dependencies]
napi-build = "2"

# This crate is shipped as a `.node` addon loaded by Electron. Keep release
# binaries small and start-up fast; LTO + single codegen unit pays off here.
[profile.release]
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
opt-level = 3
